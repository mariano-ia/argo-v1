name: QA Robots
on:
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  static-checks:
    runs-on: ubuntu-latest
    # Blocking gate on the PUSHED code (no secrets needed). Two guards born from the
    # 2026-06-05 ERR_MODULE_NOT_FOUND outage:
    #  1. check:api-imports — fails if any api/ function imports from ../src. Vercel
    #     transpiles (does not bundle) api/, so such an import passes tsc but crashes
    #     at runtime. This is the prevention layer that would have blocked that bug.
    #  2. typecheck:api — type-checks api/**/*.ts (the build's tsc only covers src/).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run check:api-imports
      - run: npm run typecheck:api

  content-lint:
    runs-on: ubuntu-latest
    # Blocking gate: the repo is clean of voseo/dash violations (backlog cleared 2026-05-26).
    # Runs on the checked-out code, so it always tests the pushed branch. Needs no secrets.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run lint:content

  e2e:
    runs-on: ubuntu-latest
    # Green with ZERO secrets: the credentialed tests (login, parked chat) auto-skip unless the
    # QA_TENANT_* secrets are set; the rest (player entry, signup gate, API/cron health, form fuzz)
    # run against QA_BASE_URL. Defaults to prod (public + reliable). To test the pushed code instead,
    # set the repo VARIABLE QA_BASE_URL to the develop preview:
    #   https://v0-argo-v1-git-develop-marianonoceti-gmailcoms-projects.vercel.app
    # (requires Vercel preview protection to be off or a bypass). The specs are non-mutating
    # (no sessions created), so no DB cleanup step / service-role key is needed.
    env:
      QA_BASE_URL: ${{ vars.QA_BASE_URL || 'https://www.argomethod.com' }}
      QA_TENANT_SLUG: ${{ vars.QA_TENANT_SLUG || 'qa-robot' }}
      QA_TENANT_EMAIL: ${{ secrets.QA_TENANT_EMAIL }}
      QA_TENANT_PASSWORD: ${{ secrets.QA_TENANT_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - run: MONKEY_RUNS=3 npm run test:monkey
      - uses: actions/upload-artifact@v4
        if: failure()
        with: { name: playwright-report, path: playwright-report/ }
