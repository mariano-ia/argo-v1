    <h2>Como funciona el perfilamiento Argo</h2>
    <p>El adulto registra al deportista. El nino juega una aventura interactiva de 10 minutos. Argo analiza su perfil conductual y entrega al adulto un informe con el arquetipo, el motor de rendimiento y el lenguaje exacto para conectar.</p>
    <h2>12 arquetipos conductuales deportivos</h2>
    <p>Impulsor Dinamico, Impulsor Decidido, Impulsor Persistente, Conector Expresivo, Conector Armonico, Conector Profundo, Sosten Adaptable, Sosten Estable, Sosten Reflexivo, Estratega Agil, Estratega Preciso, Estratega Cauteloso.</p>
    <h2>Modelo DISC + Motor = Sintonia deportiva</h2>
    <p>Argo combina el modelo DISC (4 ejes de conducta: Impulsor, Conector, Sosten, Estratega) con el Motor (ritmo de procesamiento: Rapido, Medio, Lento) para generar 12 arquetipos unicos con 36 variantes.</p>
