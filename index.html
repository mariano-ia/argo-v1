    <h1>ArgoMethod® | Perfilamiento conductual DISC para deportistas juveniles</h1>
    <p>Herramienta de perfilamiento conductual basada en el modelo DISC para deportistas juveniles de 8 a 16 anos. 12 arquetipos, un informe personalizado para entrenadores y padres.</p>
    <h2>Como funciona el perfilamiento Argo</h2>
    <p>El adulto registra al deportista. El nino juega una aventura interactiva de 10 minutos. Argo analiza su perfil conductual y entrega al adulto un informe con el arquetipo, su motor (a qué ritmo procesa y decide) y el lenguaje exacto para conectar.</p>
    <h2>12 arquetipos conductuales deportivos</h2>
    <p>Impulsor, Impulsor con veta Conector, Impulsor con veta Estratega, Conector, Conector con veta Impulsor, Conector con veta Sostenedor, Sostenedor, Sostenedor con veta Conector, Sostenedor con veta Estratega, Estratega, Estratega con veta Impulsor, Estratega con veta Sostenedor.</p>
    <h2>Modelo DISC aplicado al deporte</h2>
    <p>Argo se basa en el modelo DISC (4 ejes de conducta: Impulsor, Conector, Sostén, Estratega) para generar 12 arquetipos: los 4 ejes puros más 8 combinaciones de eje con veta. Aparte, mide el motor de cada niño (su ritmo de procesamiento) como una lectura propia, no como parte del nombre.</p>
