# Remote-config manifest for `supabase config push` (prod project "Argo").
# Every field mirrors the remote value; the ONLY intended change is adding the
# develop subdomain to the auth redirect allowlist. Verify the diff before
# confirming a push: it must show additional_redirect_urls and nothing else.
[auth]
enabled = true
site_url = "https://www.argomethod.com"
additional_redirect_urls = ["https://www.argomethod.com/**", "https://*.vercel.app/**", "https://*.vercel.app/set-password", "https://develop.argomethod.com/**", "https://www.develop.argomethod.com/**"]
jwt_expiry = 3600
enable_refresh_token_rotation = true

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
max_frequency = "1m0s"
otp_length = 8
otp_expiry = 3600
